version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: customer-intelligence-engine-api
    env_file:
      - .env
    ports:
      - "80:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
